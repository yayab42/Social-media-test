services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_media
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_media"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    working_dir: /app
    command: flask --app app run --host=0.0.0.0 --port=5000 --debug
    environment:
      FLASK_DEBUG: "1"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/social_media
      JWT_SECRET_KEY: jwt_password
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: